name: AgentGate
on: [pull_request]

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  agentgate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: brett-buskirk/agent-gate@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
